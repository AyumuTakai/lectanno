<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ToolBar</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background-color: #3a3a3a;
            width: 32px;
            overflow: hidden;
        }
        #wrapper {
            display: flex;
            flex-direction: column;
            width: 32px;
            height: 100svh;
        }
        button, input[type="image"], input[type="color"] {
            width: 32px;
            height: 32px;
            border: none;
            cursor: pointer;
        }
        button {
            background: transparent;
            color: white;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        button:hover, input[type="image"]:hover { background-color: rgba(255,255,255,0.2); }
        button.active { background-color: rgba(255,200,0,0.4); outline: 2px solid orange; }
        input[type="color"] { padding: 3px; background: transparent; }
        .spacer { flex-grow: 1; }
        /* モード切替ボタン */
        #modeToggle { font-size: 18px; }
        #modeToggle.draw-mode  { color: #7cf; outline: 2px solid #7cf; }
        #modeToggle.interact-mode { color: #fc7; outline: 2px solid #fc7; }
        /* 描画モードボタン */
        #drawMode.arrow-mode { background-color: rgba(255,255,255,0.15); outline: 2px solid #fdb; }
        #drawMode.free-mode  { background-color: rgba(255,255,255,0.15); outline: 2px solid #aef; }
    </style>
</head>
<body>
    <div id="wrapper">
        <button id="modeToggle" class="draw-mode" title="操作モードに切替">✏</button>
        <button id="drawMode" title="フリー描画に切替">
            <svg width="20" height="20" viewBox="0 0 20 20" id="drawModeIcon">
                <line x1="3" y1="17" x2="17" y2="3" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
        </button>
        <input type="color" id="colorPicker" value="#ffff00" title="ペンの色">
        <button id="lineWidth" title="線幅を変更">
            <svg width="24" height="24" viewBox="0 0 24 24">
                <line id="widthLine" x1="2" y1="12" x2="22" y2="12" stroke="white" stroke-linecap="round" stroke-width="3"/>
            </svg>
        </button>
        <button id="eraser" title="消しゴム">✕</button>
        <button id="undo" title="元に戻す">↩</button>
        <input type="image" src="bookmark.svg" id="bookmark" title="ブックマーク" style="opacity:0.5">
        <input type="image" src="trash.svg" id="trash" title="全削除">
        <div class="spacer"></div>
        <input type="image" src="square.svg" id="overlay" title="アドレスバー">
        <input type="image" src="cog.svg" id="devtool" title="開発者ツール">
    </div>
    <script>
        const widths = [4, 10, 20];
        const widthStrokes = [1.5, 3, 6];
        let widthIndex = 1;
        let isEraser = false;
        let isInteractMode = false;
        // 描画モード: line → arrow → free のサイクル
        const DRAW_MODES = ["line", "arrow", "free", "rect"];
        const DRAW_ICONS = {
            line:  '<line x1="3" y1="17" x2="17" y2="3" stroke="white" stroke-width="2.5" stroke-linecap="round"/>',
            arrow: '<line x1="3" y1="17" x2="17" y2="3" stroke="white" stroke-width="2" stroke-linecap="round"/><line x1="17" y1="3" x2="9" y2="5" stroke="white" stroke-width="2" stroke-linecap="round"/><line x1="17" y1="3" x2="15" y2="11" stroke="white" stroke-width="2" stroke-linecap="round"/>',
            free:  '<path d="M2 13 Q5 5 8 13 Q11 21 14 13 Q16 8 18 10" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>',
            rect:  '<rect x="3" y="5" width="14" height="10" rx="1" stroke="white" stroke-width="2" fill="rgba(255,255,100,0.35)"/>',
        };
        const DRAW_TITLES = {
            line:  "矢印モードへ切替",
            arrow: "フリー描画モードへ切替",
            free:  "矩形ハイライトモードへ切替",
            rect:  "直線モードへ切替",
        };
        const DRAW_CLASSES = {
            line: "", arrow: "arrow-mode", free: "free-mode", rect: "free-mode",
        };
        let drawModeIndex = 0;

        document.getElementById("drawMode").addEventListener("click", () => {
            drawModeIndex = (drawModeIndex + 1) % DRAW_MODES.length;
            const mode = DRAW_MODES[drawModeIndex];
            const btn  = document.getElementById("drawMode");
            const icon = document.getElementById("drawModeIcon");
            icon.innerHTML = DRAW_ICONS[mode];
            btn.title = DRAW_TITLES[mode];
            btn.classList.remove("arrow-mode", "free-mode");
            if (DRAW_CLASSES[mode]) btn.classList.add(DRAW_CLASSES[mode]);
            window.api.setDrawMode(mode);
        });

        document.getElementById("modeToggle").addEventListener("click", () => {
            isInteractMode = !isInteractMode;
            const btn = document.getElementById("modeToggle");
            if (isInteractMode) {
                btn.textContent = "✋";
                btn.classList.replace("draw-mode", "interact-mode");
                btn.title = "描画モードに切替";
                // 操作モード中は消しゴムを解除
                if (isEraser) {
                    isEraser = false;
                    document.getElementById("eraser").classList.remove("active");
                    window.api.setEraser(false);
                }
            } else {
                btn.textContent = "✏";
                btn.classList.replace("interact-mode", "draw-mode");
                btn.title = "操作モードに切替";
            }
            window.api.setInteractMode(isInteractMode);
        });

        function updateWidthIndicator() {
            document.getElementById("widthLine").setAttribute("stroke-width", widthStrokes[widthIndex]);
        }

        document.getElementById("colorPicker").addEventListener("input", (e) => {
            if (isEraser) {
                isEraser = false;
                document.getElementById("eraser").classList.remove("active");
                window.api.setEraser(false);
            }
            window.api.setColor(e.target.value);
        });

        document.getElementById("lineWidth").addEventListener("click", () => {
            widthIndex = (widthIndex + 1) % widths.length;
            updateWidthIndicator();
            window.api.setLineWidth(widths[widthIndex]);
        });

        document.getElementById("eraser").addEventListener("click", () => {
            isEraser = !isEraser;
            document.getElementById("eraser").classList.toggle("active", isEraser);
            window.api.setEraser(isEraser);
        });

        document.getElementById("undo").addEventListener("click", () => {
            window.api.undo();
        });

        document.getElementById("bookmark").addEventListener("click", (e) => {
            e.preventDefault();
            window.api.toggleBookmark();
        });

        document.getElementById("trash").addEventListener("click", (e) => {
            e.preventDefault();
            window.api.clearAll();
        });

        document.getElementById("overlay").addEventListener("click", (e) => {
            e.preventDefault();
            window.api.toggleOverlay();
        });

        document.getElementById("devtool").addEventListener("click", (e) => {
            e.preventDefault();
            window.api.toggleDevTool();
        });

        window.api.onBookmarkStatus((isBookmarked) => {
            document.getElementById("bookmark").style.opacity = isBookmarked ? "1" : "0.5";
        });

        updateWidthIndicator();
    </script>
</body>
</html>
